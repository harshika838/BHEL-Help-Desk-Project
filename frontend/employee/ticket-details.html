<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Details | AssetFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  :root { --sidebar-w: 240px; --topbar-h: 64px; }
  body { background: var(--slate-100); }

  .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w); background: var(--navy-900); display: flex; flex-direction: column; z-index: 20; }
  .sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 20px 22px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-brand-icon { width: 32px; height: 32px; border-radius: 7px; background: var(--amber-500); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; color: var(--navy-900); font-size: 14px; }
  .sidebar-brand-text { font-family: var(--font-display); font-weight: 600; font-size: 16px; color: var(--white); }
  .sidebar-brand-text span { color: var(--amber-400); }
  .sidebar-section-label { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: #5E7BA3; padding: 20px 22px 8px; }
  .sidebar-nav { flex: 1; overflow-y: auto; padding-bottom: 16px; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 22px; color: #B8C6DB; text-decoration: none; font-size: 13.5px; font-weight: 500; border-left: 3px solid transparent; }
  .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--white); }
  .nav-item.active { background: rgba(242,169,0,0.1); color: var(--amber-400); border-left-color: var(--amber-500); }
  .nav-icon { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.9; }
  .sidebar-footer { padding: 16px 22px; border-top: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 10px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--navy-300); display: flex; align-items: center; justify-content: center; color: var(--white); font-size: 12.5px; font-weight: 600; flex-shrink: 0; }
  .sidebar-footer-name { color: var(--white); font-size: 13px; font-weight: 500; }
  .sidebar-footer-role { color: #7F94B3; font-size: 11.5px; }

  .topbar { position: fixed; top: 0; left: var(--sidebar-w); right: 0; height: var(--topbar-h); background: var(--white); border-bottom: 1px solid var(--slate-200); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; z-index: 10; }
  .topbar-title { font-family: var(--font-display); font-weight: 600; font-size: 18px; color: var(--slate-900); }
  .topbar-meta { font-family: var(--font-mono); font-size: 11.5px; color: #98A4B3; margin-top: 2px; }
  .icon-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--slate-200); background: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--slate-600); position: relative; }
  .icon-dot { position: absolute; top: 7px; right: 7px; width: 7px; height: 7px; border-radius: 50%; background: var(--amber-500); border: 1.5px solid var(--white); }

  .main { margin-left: var(--sidebar-w); margin-top: var(--topbar-h); padding: 28px; min-height: calc(100vh - var(--topbar-h)); }

  .back-link { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--slate-600); text-decoration: none; margin-bottom: 16px; font-weight: 500; }
  .back-link:hover { color: var(--navy-700); }

  .ticket-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 22px; }
  .ticket-header h1 { font-family: var(--font-display); font-weight: 600; font-size: 21px; margin-bottom: 6px; }
  .ticket-meta-line { display: flex; align-items: center; gap: 10px; font-size: 12.5px; color: var(--slate-600); flex-wrap: wrap; }
  .ticket-meta-line .mono { font-family: var(--font-mono); color: var(--navy-700); font-weight: 500; }

  .priority { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 500; }
  .priority-bar { width: 3px; height: 14px; border-radius: 2px; }
  .priority-Low .priority-bar { background: #94A3B8; }
  .priority-Medium .priority-bar { background: #378ADD; }
  .priority-High .priority-bar { background: #EF9F27; }
  .priority-Critical .priority-bar { background: #E24B4A; }

  .detail-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 18px; align-items: start; }

  .panel { background: var(--white); border: 1px solid var(--slate-200); border-radius: 12px; padding: 22px; margin-bottom: 18px; }
  .panel h3 { font-family: var(--font-display); font-weight: 600; font-size: 14.5px; margin-bottom: 12px; }
  .panel p.desc { font-size: 13.5px; line-height: 1.6; color: var(--slate-900); }

  .thread-item { display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--slate-200); }
  .thread-item:last-child { border-bottom: none; }
  .thread-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--navy-500); color: var(--white); font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .thread-name { font-size: 13px; font-weight: 600; }
  .thread-time { font-size: 11.5px; color: var(--slate-600); margin-left: 8px; font-weight: 400; }
  .thread-text { font-size: 13.5px; color: var(--slate-900); margin-top: 4px; line-height: 1.5; }

  .comment-box { margin-top: 16px; }
  .comment-box textarea {
    width: 100%; min-height: 80px; padding: 12px 14px; border: 1.5px solid var(--slate-200); border-radius: 8px;
    font-family: var(--font-body); font-size: 13.5px; resize: vertical;
  }
  .comment-box textarea:focus { outline: none; border-color: var(--navy-500); }
  .comment-box button { margin-top: 10px; }

  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--slate-200); font-size: 13px; }
  .info-row:last-child { border-bottom: none; }
  .info-row .k { color: var(--slate-600); }
  .info-row .v { font-weight: 500; text-align: right; }

  @media (max-width: 950px) {
    .detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-brand-icon">AF</div>
    <div class="sidebar-brand-text">Asset<span>Flow</span></div>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Overview</div>
    <a href="dashboard.html" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      Dashboard
    </a>
    <div class="sidebar-section-label">My workspace</div>
    <a href="assets.html" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="12" rx="1.5"/><path d="M8 20h8M12 16v4"/></svg>
      My Assets
    </a>
    <a href="tickets.html" class="nav-item active">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 8.5A2.5 2.5 0 015.5 6h13A2.5 2.5 0 0121 8.5v1.7a2 2 0 000 3.6v1.7a2.5 2.5 0 01-2.5 2.5h-13A2.5 2.5 0 013 15.5v-1.7a2 2 0 000-3.6z"/></svg>
      My Tickets
    </a>
    <a href="raise-ticket.html" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 5v14M5 12h14"/></svg>
      Raise Ticket
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="avatar" id="userAvatar">--</div>
    <div>
      <div class="sidebar-footer-name" id="userName">Loading...</div>
      <div class="sidebar-footer-role">Employee</div>
    </div>
  </div>
</aside>

<header class="topbar">
  <div>
    <div class="topbar-title">Ticket Details</div>
    <div class="topbar-meta">BHEL Haridwar · IT Department</div>
  </div>
  <div style="display:flex; gap:12px;">
    <button class="icon-btn" aria-label="Notifications">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>
      <span class="icon-dot"></span>
    </button>
  </div>
</header>

<main class="main">
  <a href="tickets.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to my tickets
  </a>

  <div id="ticketContent">
    <p style="color:var(--slate-600); font-size:13.5px;">Loading ticket...</p>
  </div>
</main>

<script>
  const token = localStorage.getItem('token');
  const userName = localStorage.getItem('name') || 'Employee';
  if (!token) window.location.href = '../login.html';

  document.getElementById('userName').textContent = userName;
  document.getElementById('userAvatar').textContent = userName.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);

  const params = new URLSearchParams(window.location.search);
  const ticketId = params.get('id');

  function formatDateTime(dateString) {
    if (!dateString) return '—';
    const d = new Date(dateString);
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) + ', ' +
           d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  function initials(name) {
    if (!name) return '??';
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  async function postComment() {
    const textarea = document.getElementById('commentInput');
    const comment = textarea.value.trim();
    if (!comment) return;

    try {
      const res = await fetch(`http://localhost:5001/api/tickets/${ticketId}/comments`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ comment })
      });
      const data = await res.json();
      if (!res.ok) {
        alert(data.message || 'Could not post comment.');
        return;
      }
      textarea.value = '';
      loadTicket();
    } catch (err) {
      console.error('Post comment error:', err);
      alert('Could not connect to the server.');
    }
  }

  async function loadTicket() {
    const content = document.getElementById('ticketContent');

    if (!ticketId) {
      content.innerHTML = `<p style="color:var(--danger);">No ticket ID provided.</p>`;
      return;
    }

    try {
      const res = await fetch(`http://localhost:5001/api/tickets/${ticketId}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const t = await res.json();

      if (!res.ok) {
        content.innerHTML = `<p style="color:var(--danger);">Could not load ticket.</p>`;
        return;
      }

      const priorityClass = 'priority-' + t.priority;
      const comments = t.comments || [];

      content.innerHTML = `
        <div class="ticket-header">
          <div>
            <h1>${t.title}</h1>
            <div class="ticket-meta-line">
              <span class="mono">TKT-${t.ticket_id}</span>
              <span>·</span>
              <span>Raised by ${t.raised_by_name || '—'}</span>
              <span>·</span>
              <span>${formatDateTime(t.created_at)}</span>
            </div>
          </div>
          <div class="priority ${priorityClass}"><span class="priority-bar"></span>${t.priority} priority</div>
        </div>

        <div class="detail-grid">
          <div>
            <div class="panel">
              <h3>Description</h3>
              <p class="desc">${t.description || 'No description provided.'}</p>
            </div>

            <div class="panel">
              <h3>Activity</h3>
              <div id="commentsThread">
                ${comments.length === 0
                  ? '<p style="color:var(--slate-600); font-size:13px;">No comments yet.</p>'
                  : comments.map(c => `
                    <div class="thread-item">
                      <div class="thread-avatar">${initials(c.commenter_name)}</div>
                      <div>
                        <span class="thread-name">${c.commenter_name} <span class="thread-time">${formatDateTime(c.created_at)}</span></span>
                        <div class="thread-text">${c.comment}</div>
                      </div>
                    </div>
                  `).join('')
                }
              </div>

              <div class="comment-box">
                <textarea id="commentInput" placeholder="Add an update or comment..."></textarea>
                <button class="btn-primary" onclick="postComment()">Post comment</button>
              </div>
            </div>
          </div>

          <div>
            <div class="panel">
              <h3>Ticket info</h3>
              <div class="info-row"><span class="k">Status</span><span class="v">${t.status}</span></div>
              <div class="info-row"><span class="k">Assigned to</span><span class="v">${t.assigned_to_name || 'Unassigned'}</span></div>
              <div class="info-row"><span class="k">Raised on</span><span class="v">${formatDateTime(t.created_at)}</span></div>
            </div>
          </div>
        </div>
      `;

    } catch (err) {
      console.error('Load ticket error:', err);
      content.innerHTML = `<p style="color:var(--danger);">Could not connect to the server.</p>`;
    }
  }

  loadTicket();
</script>

</body>
</html>
